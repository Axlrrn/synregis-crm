<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="SynRegis CRM — Gestion de projets immobiliers" />

    <!-- iOS / Safari home screen -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SynRegis" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Capture the install prompt as early as possible. CRA injects the React
         bundle at the end of <body>, so the event can fire before React mounts;
         stash it here so the in-app Install button never misses it. -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__deferredInstallPrompt = null;
        window.dispatchEvent(new Event('pwa-installed'));
      });
    </script>

    <title>SynRegis CRM</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
